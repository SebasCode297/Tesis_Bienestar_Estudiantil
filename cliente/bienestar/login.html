<!DOCTYPE html>
<html lang="es">
<head>
    <!-- =============================================
         login.html — Página de inicio de sesión
         Departamento de Bienestar Estudiantil — ISTPET
         ============================================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicio de sesión — Bienestar Estudiantil ISTPET">
    <title>Ingresar — Bienestar Estudiantil</title>

    <!-- Hoja de estilos específica para el login -->
    <link rel="stylesheet" href="estilos/login.css">
</head>
<body>

    <!-- =============================================
         CONTENEDOR PRINCIPAL — layout de dos columnas
         - Panel izquierdo: decorativo institucional
         - Panel derecho: formulario de login
         ============================================= -->
    <div class="contenedor-login">

        <!-- ==========================================
             PANEL IZQUIERDO — identidad institucional
             ========================================== -->
        <div class="panel-izquierdo" aria-hidden="true">

            <!-- Nombre del instituto -->
            <div class="panel-izquierdo__nombre">
                <h1>ISTPET</h1>
                <p>Instituto Superior<br>Tecnológico</p>
            </div>

            <!-- Línea divisora dorada -->
            <div class="panel-izquierdo__divisor"></div>

            <!-- Nombre del departamento -->
            <div class="panel-izquierdo__departamento">
                <span>Departamento de</span>
                <h2>Bienestar Estudiantil</h2>
            </div>

        </div>

        <!-- ==========================================
             PANEL DERECHO — formulario de autenticación
             ========================================== -->
        <div class="panel-derecho">

            <!-- Contenedor del formulario con ancho máximo controlado -->
            <div class="formulario-login" role="main">

                <!-- Encabezado del formulario -->
                <div class="formulario-login__encabezado">
                    <h2>Bienvenido</h2>
                    <p>Ingresa tus credenciales para acceder al sistema</p>
                </div>

                <!-- ======================================
                     FORMULARIO DE LOGIN
                     Los datos se envían por JS (fetch API)
                     para mostrar errores sin recargar la página
                     ====================================== -->
                <form id="formulario-autenticacion" novalidate>

                    <!-- Campo: Correo institucional -->
                    <div class="campo-grupo">
                        <label for="campo-correo">Correo institucional</label>
                        <input
                            type="email"
                            id="campo-correo"
                            name="correo"
                            autocomplete="username"
                            required
                            spellcheck="false"
                        >
                    </div>

                    <!-- Campo: Contraseña con botón para mostrar/ocultar -->
                    <div class="campo-grupo">
                        <label for="campo-contrasena">Contraseña</label>
                        <div class="campo-contrasena">
                            <input
                                type="password"
                                id="campo-contrasena"
                                name="contrasena"
                                autocomplete="current-password"
                                required
                            >
                            <!-- Botón ojo: muestra u oculta la contraseña -->
                            <button
                                type="button"
                                class="btn-ojo"
                                id="btn-mostrar-contrasena"
                                aria-label="Mostrar u ocultar contraseña"
                                style="font-size: 0.75rem; font-weight: 600; padding: 0 10px;"
                            >
                                Ver
                            </button>
                        </div>
                    </div>

                    <!-- Botón de ingreso -->
                    <button
                        type="submit"
                        class="btn-ingresar"
                        id="btn-ingresar"
                    >
                        Ingresar
                    </button>

                    <!-- Mensaje de error (oculto por defecto, JS lo activa) -->
                    <div class="mensaje-error" id="mensaje-error" role="alert">
                        <!-- El texto del error se escribe con JS -->
                        <span id="texto-error"></span>
                    </div>

                </form>

                <!-- Enlace para volver a la página de inicio (sin flecha decorativa) -->
                <a href="/" class="link-inicio">Volver al inicio</a>

            </div>
        </div>

    </div>

    <!-- =============================================
         SCRIPT — Lógica del formulario de login
         Envía las credenciales por AJAX (fetch API)
         sin recargar la página
         ============================================= -->
    <script>
        // Referencia al elemento raíz del formulario de inicio de sesión
        const formulario       = document.getElementById('formulario-autenticacion'); // Captura el formulario por su ID
        // Referencia al campo de entrada del correo electrónico institucional
        const campoCorrro      = document.getElementById('campo-correo'); // Captura el input del correo
        // Referencia al campo de entrada de la contraseña del usuario
        const campoContrasena  = document.getElementById('campo-contrasena'); // Captura el input de la contraseña
        // Referencia al botón principal que dispara el envío de datos
        const btnIngresar      = document.getElementById('btn-ingresar'); // Captura el botón ingresar
        // Referencia al contenedor que muestra mensajes de error visuales
        const mensajeError     = document.getElementById('mensaje-error'); // Captura el div de alerta
        // Referencia al span interno donde se inserta el texto del error
        const textoError       = document.getElementById('texto-error'); // Captura el elemento de texto del error
        // Referencia al botón especial para alternar visibilidad de contraseña
        const btnMostrar       = document.getElementById('btn-mostrar-contrasena'); // Captura el botón del ojo (texto ver)

        // Función encargada de hacer visible el mensaje de error en pantalla
        function mostrarError(mensaje) { // Recibe el texto descriptivo del error ocurrido
            textoError.textContent = mensaje; // Inserta el mensaje en el elemento HTML correspondiente
            mensajeError.classList.add('visible'); // Añade la clase CSS que hace visible el contenedor
        } // Fin de la función mostrarError

        // Función encargada de limpiar y ocultar la alerta de error
        function ocultarError() { // No requiere parámetros
            mensajeError.classList.remove('visible'); // Quita la clase CSS de visibilidad
            textoError.textContent = ''; // Limpia el contenido de texto previo
        } // Fin de la función ocultarError

        // Escucha el evento clic para mostrar u ocultar la contraseña escrita
        btnMostrar.addEventListener('click', () => { // Función anónima ejecutada al hacer clic
            if (campoContrasena.type === 'password') { // Verifica si el tipo actual es oculto (password)
                // Cambia el tipo a texto para que los caracteres sean legibles
                campoContrasena.type = 'text'; // Cambia el atributo type del input
                btnMostrar.textContent = 'Ocultar'; // Actualiza el texto del botón a Ocultar
            } else { // Si el tipo ya era texto
                // Regresa el tipo a password para proteger la visualización
                campoContrasena.type = 'password'; // Restaura el atributo type original
                btnMostrar.textContent = 'Ver'; // Actualiza el texto del botón a Ver
            } // Fin de la condición de alternancia
        }); // Fin del evento de escucha del botón mostrar

        // Agrega evento para ocultar el error mientras el usuario edita el correo
        campoCorrro.addEventListener('input', ocultarError); // Llama a ocultarError en cada pulsación
        // Agrega evento para ocultar el error mientras el usuario edita la contraseña
        campoContrasena.addEventListener('input', ocultarError); // Llama a ocultarError en cada pulsación

        // Manejador principal para el envío del formulario mediante tecnología AJAX
        formulario.addEventListener('submit', async (evento) => { // Función asíncrona para manejar la petición
            // Evita que el navegador recargue la página automáticamente
            evento.preventDefault(); // Detiene el comportamiento estándar de envío
            ocultarError(); // Asegura que no haya mensajes de error previos visibles

            // Captura los valores actuales ingresados por el usuario
            const correo    = campoCorrro.value.trim(); // Obtiene correo y elimina espacios sobrantes
            const contrasena = campoContrasena.value; // Obtiene el valor literal de la contraseña

            // Verifica que los campos obligatorios no estén vacíos antes de enviar
            if (!correo || !contrasena) { // Condición de validación básica
                mostrarError('Por favor completa todos los campos'); // Informa al usuario del campo faltante
                return; // Detiene la ejecución del proceso de envío
            } // Fin de validación previa

            // Actualiza la interfaz para indicar que se está procesando la solicitud
            btnIngresar.textContent = 'Verificando...'; // Cambia el texto del botón
            btnIngresar.disabled = true; // Deshabilita el botón para evitar clics duplicados

            try { // Inicia bloque para manejo de riesgos en la petición de red
                // Realiza la petición asíncrona POST al endpoint de autenticación
                const respuesta = await fetch('/bienestar/auth/login', { // Llama a la API del backend
                    method: 'POST', // Define el método HTTP como POST
                    headers: { // Configura los metadatos de la comunicación
                        'Content-Type': 'application/json' // Indica que el cuerpo es un objeto JSON
                    }, // Fin de configuración de cabeceras
                    body: JSON.stringify({ correo, contrasena }) // Convierte datos a string JSON
                }); // Espera la resolución de la promesa fetch

                // Procesa la respuesta del servidor interpretándola como JSON
                const datos = await respuesta.json(); // Convierte el flujo de datos a objeto JS

                if (datos.exito) { // Verifica si el backend confirmó las credenciales
                    // Informa éxito y ejecuta la redirección configurada
                    btnIngresar.textContent = '¡Acceso concedido!'; // Mensaje final de éxito en botón
                    window.location.href = datos.redirigir; // Redirige al panel administrativo principal
                } else { // Si las credenciales fueron rechazadas o hubo error lógico
                    // Muestra el motivo del fallo devuelto por el servidor
                    mostrarError(datos.mensaje || 'Error al iniciar sesión'); // Usa mensaje de API o genérico
                    btnIngresar.textContent = 'Ingresar'; // Restaura el texto original del botón
                    btnIngresar.disabled = false; // Reactiva el botón para un nuevo intento
                } // Fin de verificación de éxito de autenticación

            } catch (errorRed) { // Captura fallos de conectividad o errores de infraestructura
                // Informa al usuario sobre la imposibilidad de contactar al backend
                mostrarError('No se pudo conectar con el servidor. Intenta nuevamente.'); // Mensaje de red
                btnIngresar.textContent = 'Ingresar'; // Restaura el texto del botón
                btnIngresar.disabled = false; // Reactiva la interfaz para reintentar
            } // Fin del bloque try-catch de red
        }); // Fin del evento submit del formulario
    </script>

</body>
</html>
